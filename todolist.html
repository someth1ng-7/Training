<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="todolist.css">
</head>
<body>
    <div class="container">

    <h1>Todo App</h1>

    <div class="add-section">
        <input type="text" id="taskInput" placeholder="Enter task">

        <select id="priority">
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
        </select>

        <input type="date" id="dueDate">

        <button id="addBtn">Add Task</button>
    </div>

    <p id="error"></p>

    <input type="text" id="searchInput" placeholder="Search tasks">

    <div class="filters">
        <button class="filterBtn" data-filter="all">All</button>
        <button class="filterBtn" data-filter="completed">Completed</button>
        <button class="filterBtn" data-filter="pending">Pending</button>
    </div>

    <div class="stats">
        <p>Total: <span id="totalTasks">0</span></p>
        <p>Completed: <span id="completedTasks">0</span></p>
        <p>Pending: <span id="pendingTasks">0</span></p>
    </div>
<script src="todolist.js"></script>
    <ul id="taskList"></ul>

    <button id="clearBtn">Clear All</button>

</div>
</body>
</html>
